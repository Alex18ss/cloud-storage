services:
  db:
    image: postgres:15
    container_name: cloud-storage-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}  # имя базы данных из .env файла
      POSTGRES_USER: ${POSTGRES_USER}  # пользователь из .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # пароль из .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432"
    networks:
      - cloud-storage-network

  backend:
    build: ./backend
    container_name: cloud-storage-backend
    env_file:
      - .env
    restart: always
    environment:
      # строка подключения к базе данных, собирается из переменных .env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # адрес MinIO для S3 API (имя сервиса + порт)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}  # логин от MinIO из .env
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}  # пароль от MinIO из .env
      SECRET_KEY: your-fastapi-secret-key-change-this  # ключ для JWT (в продакшене тоже в .env)
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio
    volumes:
      - ./backend:/app  # монтируем код для разработки
    networks:
      - cloud-storage-network

  frontend:
    build: ./frontend
    container_name: cloud-storage-frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:8000  # для React — куда отправлять запросы
    depends_on:
      - backend
    networks:
      - cloud-storage-network
    # порты не открываем — nginx будет проксировать

  server-nginx:
    image: nginx:alpine
    container_name: cloud-storage-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro  # для продакшен сборки React
#      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro  # конфиг nginx
    depends_on:
      - backend
    networks:
      - cloud-storage-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    # server /data — запустить сервер MinIO и хранить данные в папке /data внутри контейнера
    # --console-address ":9001" — запустить веб-интерфейс для управления на порту 9001
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Веб-интерфейс
    # Порт	         Назначение	                                           Как доступиться
    # 9000:9000	  S3 API — основной порт для работы с файлами	    Твой код будет обращаться сюда (http://localhost:9000)
    # 9001:9001	  Веб-интерфейс (админка)	                        Открой в браузере http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}  # логин админа из .env файла
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}  # пароль админа из .env
    volumes:
      - minio_data:/data
    # Монтирование тома для сохранения данных:
    # minio_data — имя тома (объявлен в разделе volumes внизу файла)
    # /data — папка внутри контейнера, куда MinIO сохраняет файлы
    networks:
      - cloud-storage-network



networks:
  cloud-storage-network:  # объявляем сеть
    driver: bridge

volumes:
  postgres_data:  # том для данных PostgreSQL
  minio_data:     # том для данных MinIO
